<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Реал Лайф РПГ v8.0</title>
    <!-- Подключаем стили твоей игры -->
    <link rel="stylesheet" href="style.css">
    <!-- Надежное подключение базы данных Supabase через Cloudflare CDN -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <!-- Вся разметка твоей игры (кнопки, вкладки, статы) -->
    <div class="header-bar">
        <div class="gold-badge">🪙 Золото: <span id="gold-count">0</span></div>
        <div class="level-badge">⭐ Уровень: <span id="player-level">1</span></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('upgrade')">Прокачка</button>
        <button class="tab-btn" onclick="switchTab('quests')">Квесты</button>
        <button class="tab-btn" onclick="switchTab('shop')">Магазин</button>
        <button class="tab-btn" onclick="switchTab('achievements')">Ачивки</button>
    </div>

    <!-- ВКЛАДКА ПРОКАЧКИ -->
    <div id="upgrade" class="screen active">
        <div class="profile-card">
            <h1>Прокачка характеристик</h1>
            <p class="title-display">Твой титул: <span id="player-title">Бомж</span></p>
            <div class="progress-container">
                <div class="progress-bar" id="xp-bar"></div>
            </div>
            <p style="text-align: center; margin-top: 5px; font-size: 12px; color: #aaa;">Опыт: <span id="xp-text">0/100</span></p>
        </div>

        <div class="stat-container">
            <button class="action-btn" style="background: #111; grid-column: span 2; display: flex; justify-content: center; align-items: center; gap: 8px;" onclick="goToSleep()">
                <span>🛌</span> Лечь спать <span id="energy-display" style="color: #ff9f00;">(100%)</span>
            </button>
            <div class="stat-box">
                <div class="stat-info">💪 Сила <span class="stat-val" id="stat-strength">10</span></div>
                <button class="plus-btn" onclick="upgradeStat('strength')">+</button>
            </div>
            <div class="stat-box">
                <div class="stat-info">🏃‍♂️ Выносливость <span class="stat-val" id="stat-endurance">0</span></div>
                <button class="plus-btn" onclick="upgradeStat('endurance')">+</button>
            </div>
            <div class="stat-box">
                <div class="stat-info">🎯 Ловкость <span class="stat-val" id="stat-agility">0</span></div>
                <button class="plus-btn" onclick="upgradeStat('agility')">+</button>
            </div>
            <div class="stat-box">
                <div class="stat-info">🧠 Интеллект <span class="stat-val" id="stat-intelligence">0</span></div>
                <button class="plus-btn" onclick="upgradeStat('intelligence')">+</button>
            </div>
            <div class="stat-box">
                <div class="stat-info">🕶️ Харизма <span class="stat-val" id="stat-charisma">0</span></div>
                <button class="plus-btn" onclick="upgradeStat('charisma')">+</button>
            </div>
            <div class="stat-box">
                <div class="stat-info">👁️ Восприятие <span class="stat-val" id="stat-perception">0</span></div>
                <button class="plus-btn" onclick="upgradeStat('perception')">+</button>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА КВЕСТОВ -->
    <div id="quests" class="screen">
        <h2 style="margin-bottom: 15px; color: #00ffff;">Доступные квесты</h2>
        <div id="quests-list"></div>
    </div>

    <!-- ВКЛАДКА МАГАЗИНА -->
    <div id="shop" class="screen">
        <h2 style="margin-bottom: 15px; color: #00ffff;">Магазин предметов</h2>
        <div id="shop-list"></div>
    </div>

    <!-- ВКЛАДКА ДОСТИЖЕНИЙ -->
    <div id="achievements" class="screen">
        <h2 style="margin-bottom: 15px; color: #00ffff;">Твои ачивки</h2>
        <div id="achievements-list"></div>
    </div>

    <!-- ВАЖНО: Сначала подключаем логику твоей игры, затем скрипт авторизации базы данных -->
    <script src="script.js"></script>
    <script src="supabase-auth.js"></script>
</body>
</html>
